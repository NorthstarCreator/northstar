<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Northstar Sandbox Dashboard v2</title>
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar" aria-label="Primary navigation">
        <a class="brand-lockup" href="#brief" aria-label="Northstar Morning Brief">
          <img src="assets/northstar-logo-horizontal.svg" alt="Northstar">
          <span>Data Becomes Direction.</span>
        </a>
        <nav id="sidebarNav" class="nav-list" aria-label="Sandbox pages"></nav>
        <button id="addAccountButton" class="sidebar-action" type="button">
          <span class="action-plus">+</span>
          <span>Add Account</span>
        </button>
        <div class="sidebar-note">
          <span>Sandbox prototype</span>
          <strong>Mock data only</strong>
          <small>No TikTok credentials or live APIs are used.</small>
        </div>
      </aside>

      <main class="main-shell">
        <header class="topbar">
          <div>
            <p class="eyebrow">Visual Prototype v2</p>
            <h1 id="pageTitle">Morning Brief</h1>
          </div>
          <div class="controls" aria-label="Dashboard filters">
            <div class="selector-wrap">
              <button id="accountButton" class="account-button" type="button" aria-haspopup="listbox" aria-expanded="false">
                <span id="accountAvatar" class="avatar avatar-all" aria-hidden="true">RR</span>
                <span>
                  <small>Account</small>
                  <strong id="accountLabel">All Accounts</strong>
                </span>
                <span class="chevron" aria-hidden="true">⌄</span>
              </button>
              <div id="accountMenu" class="popover menu-popover" hidden role="listbox" aria-label="Choose account"></div>
            </div>

            <div class="selector-wrap">
              <button id="dateButton" class="date-button" type="button" aria-haspopup="menu" aria-expanded="false">
                <span>
                  <small>Date range</small>
                  <strong id="dateLabel">This Month</strong>
                </span>
                <span class="chevron" aria-hidden="true">⌄</span>
              </button>
              <div id="dateMenu" class="popover date-popover" hidden>
                <div class="date-options" role="menu" aria-label="Date ranges"></div>
                <form id="customDatePanel" class="custom-date-panel" hidden>
                  <label>
                    <span>Start Date</span>
                    <input id="customStart" type="date" value="2026-07-01">
                  </label>
                  <label>
                    <span>End Date</span>
                    <input id="customEnd" type="date" value="2026-07-16">
                  </label>
                  <div class="button-row">
                    <button class="secondary-button" type="button" data-action="cancel-custom">Cancel</button>
                    <button class="primary-button" type="submit">Apply</button>
                  </div>
                </form>
              </div>
            </div>
          </div>
        </header>

        <section class="sync-strip" aria-label="Sandbox status">
          <span>Last Sync</span>
          <strong>Today at 8:04 AM</strong>
          <span class="dot"></span>
          <span>Prototype values update with account, date, and revenue-source filters.</span>
        </section>

        <section id="content" class="content-area" tabindex="-1" aria-live="polite"></section>
      </main>
    </div>

    <div id="modalRoot" class="modal-root" hidden></div>

    <script src="mock-data.js"></script>
    <script src="app.js"></script>
  </body>
</html>
