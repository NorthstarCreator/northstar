<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96" role="img" aria-labelledby="title desc">
  <title id="title">NorthStar Mark</title>
  <desc id="desc">A minimal four-point compass mark with a gold spark at the center.</desc>
  <defs>
    <filter id="sparkGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="2.4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <circle cx="48" cy="48" r="36" fill="none" stroke="#10233F" stroke-width="2.4" opacity=".18"/>
  <path d="M48 9 56 40 48 34 40 40Z" fill="#10233F"/>
  <path d="M48 87 40 56 48 62 56 56Z" fill="#10233F" opacity=".86"/>
  <path d="M87 48 56 56 62 48 56 40Z" fill="#10233F" opacity=".86"/>
  <path d="M9 48 40 40 34 48 40 56Z" fill="#10233F" opacity=".86"/>
  <g filter="url(#sparkGlow)">
    <path d="M48 33 51.6 44.4 63 48 51.6 51.6 48 63 44.4 51.6 33 48 44.4 44.4Z" fill="#D4A72C"/>
    <path d="M48 38 50.5 45.5 58 48 50.5 50.5 48 58 45.5 50.5 38 48 45.5 45.5Z" fill="#FFF3B0"/>
  </g>
</svg>
